name: Publish release

on:
  push:
    tags:
      - v0.5.2

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS arm64
    runs-on: macos-14
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Select Swift 6 toolchain
        run: |
          sudo xcode-select --switch /Applications/Xcode_16.2.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Verify release version
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF_NAME" = "v0.5.2"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' macos/Resources/Info.plist | grep -Fx '0.5.2'

      - name: Build and ad-hoc sign Wonder
        working-directory: macos
        env:
          WONDER_SIGNING_MODE: adhoc
        run: ./scripts/build-app.sh

      - name: Package and verify macOS assets
        shell: bash
        run: |
          set -euo pipefail
          APP="macos/.build/Wonder.app"
          DIST="$RUNNER_TEMP/wonder-dist"
          STAGING="$RUNNER_TEMP/wonder-dmg"
          mkdir -p "$DIST" "$STAGING"

          file "$APP/Contents/MacOS/Wonder" | grep -q 'arm64'
          codesign --verify --deep --strict --verbose=2 "$APP"

          cp -R "$APP" "$STAGING/Wonder.app"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "Wonder" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            "$DIST/Wonder-v0.5.2-macOS-arm64.dmg"
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP" \
            "$DIST/Wonder-v0.5.2-macOS-arm64.zip"

          hdiutil verify "$DIST/Wonder-v0.5.2-macOS-arm64.dmg"
          unzip -t "$DIST/Wonder-v0.5.2-macOS-arm64.zip"
          unzip -Z1 "$DIST/Wonder-v0.5.2-macOS-arm64.zip" | grep -q '^Wonder.app/Contents/MacOS/Wonder$'

      - name: Upload macOS assets
        uses: actions/upload-artifact@v5
        with:
          name: macos-release
          path: ${{ runner.temp }}/wonder-dist/*
          if-no-files-found: error

  windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained Windows executable
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if ($env:GITHUB_REF_NAME -ne "v0.5.2") { throw "Unexpected release tag." }
          $project = "windows/GlassTranslate.Windows/GlassTranslate.Windows.csproj"
          $publish = Join-Path $env:RUNNER_TEMP "wonder-publish"
          $dist = Join-Path $env:RUNNER_TEMP "wonder-dist"
          New-Item -ItemType Directory -Force -Path $publish, $dist | Out-Null

          dotnet publish $project `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:Version=0.5.2 `
            -p:AssemblyVersion=0.5.2.0 `
            -p:FileVersion=0.5.2.0 `
            -o $publish

          $source = Join-Path $publish "Wonder.exe"
          $target = Join-Path $dist "Wonder-v0.5.2-windows-x64.exe"
          if (-not (Test-Path $source)) { throw "Wonder.exe was not produced." }
          Copy-Item $source $target
          if ((Get-ChildItem $dist -Filter *.exe).Count -ne 1) { throw "Unexpected Windows asset count." }
          if ((Get-Item $target).Length -lt 1MB) { throw "Published executable is unexpectedly small." }

      - name: Upload Windows asset
        uses: actions/upload-artifact@v5
        with:
          name: windows-release
          path: ${{ runner.temp }}/wonder-dist/Wonder-v0.5.2-windows-x64.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Check out release notes
        uses: actions/checkout@v5

      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Validate assets
        shell: bash
        run: |
          set -euo pipefail
          test -s dist/Wonder-v0.5.2-macOS-arm64.dmg
          test -s dist/Wonder-v0.5.2-macOS-arm64.zip
          test -s dist/Wonder-v0.5.2-windows-x64.exe
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 3

      - name: Publish v0.5.2
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/Wonder-v0.5.2-macOS-arm64.dmg \
            dist/Wonder-v0.5.2-macOS-arm64.zip \
            dist/Wonder-v0.5.2-windows-x64.exe \
            --verify-tag \
            --latest \
            --title "Wonder v0.5.2" \
            --notes-file docs/RELEASE_NOTES_v0.5.2.md
